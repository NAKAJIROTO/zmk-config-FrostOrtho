# ========================================
# 基本設定
# ========================================
CONFIG_ZMK_KEYBOARD_NAME="FrostOrtho"
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_NFCT_PINS_AS_GPIOS=y
CONFIG_ZMK_BLE=y
CONFIG_SPI=y
CONFIG_INPUT=y

# Battery
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_BT_BAS=y

# Bluetooth接続設定
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12

# ========================================
# ZMK Studio（公式標準ベース）
# ========================================
CONFIG_ZMK_STUDIO=y
CONFIG_SETTINGS=y

# ========================================
# DYA Studio 関連モジュールの削除・無効化
# ========================================
# BLE管理（標準のZMK Studioのみにするため無効化）
CONFIG_ZMK_BLE_MANAGEMENT=n
CONFIG_ZMK_BLE_MANAGEMENT_STUDIO_RPC=n

# バッテリー履歴（不要なため削除）
CONFIG_ZMK_BATTERY_HISTORY=n
CONFIG_ZMK_BATTERY_HISTORY_STUDIO_RPC=n

# 独自のSettings RPC（不要なため削除）
CONFIG_ZMK_SETTINGS_RPC=n
CONFIG_ZMK_SETTINGS_RPC_STUDIO=n

# DYA独自のイベントリレー（競合の原因になるため無効化）
CONFIG_ZMK_SPLIT_RELAY_EVENT=n

# インプットプロセッサー / ランタイムセンサーのRPCを無効化
# (これにより公式ZMK Studioとの競合を防ぎます)
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR=n
CONFIG_ZMK_RUNTIME_INPUT_PROCESSOR_STUDIO_RPC=n
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE=n
CONFIG_ZMK_RUNTIME_SENSOR_ROTATE_STUDIO_RPC=n

# 設定の保存遅延（標準値）
CONFIG_ZMK_SETTINGS_SAVE_DEBOUNCE=2000
